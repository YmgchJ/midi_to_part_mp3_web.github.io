name: Production Healthcheck

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check production URL
        env:
          PRODUCTION_URL: https://ymgchj.github.io/midi_to_part_mp3_web.github.io/
        run: npm run check:prod
